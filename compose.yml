services:
    websh-tunnel:
        container_name: websh-tunnel
        image: ghcr.io/websh-labs/websh-tunnel:latest
        restart: unless-stopped
        env_file:
            - .env
        ports:
            - '5152:5152'
        networks:
            - websh-network
        environment:
            - TUNNEL_SECRET=${TUNNEL_SECRET}
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:5152/health']
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 5s

networks:
  websh-network:
    external: true
